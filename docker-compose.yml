version: '3.8'

services:
  backend:
    build:
      context: ./backend/Protocol.Api
      dockerfile: Dockerfile
    expose:
      - "5000"
    volumes:
      - protocol-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  protocol-data:
