name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-windows:
    name: Build & Publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            widget/package-lock.json
            frontend/package-lock.json

      - name: Publish .NET API (win-x64)
        run: |
          dotnet publish backend/Protocol.Api/Protocol.Api.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o widget/resources/api/win-x64

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for desktop
        working-directory: frontend
        run: npm run build:desktop

      - name: Install widget dependencies
        working-directory: widget
        run: npm ci

      - name: Build renderer + main
        working-directory: widget
        run: npm run build

      - name: Package & publish to GitHub Releases
        working-directory: widget
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
