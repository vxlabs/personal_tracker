name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-windows:
    name: Build & Publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json

      - name: Install widget dependencies
        working-directory: widget
        run: npm ci

      - name: Build renderer + main
        working-directory: widget
        run: npm run build

      - name: Package & publish to GitHub Releases
        working-directory: widget
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-mac:
    name: Build & Publish (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json

      - name: Install widget dependencies
        working-directory: widget
        run: npm ci

      - name: Build renderer + main
        working-directory: widget
        run: npm run build

      - name: Package & publish to GitHub Releases
        working-directory: widget
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable notarization for now — remove these lines once you have
          # an Apple Developer certificate configured in repository secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false
